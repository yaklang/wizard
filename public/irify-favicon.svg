<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#00D9FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0D1117"/>
  <!-- Brackets -->
  <text x="3" y="22" font-family="monospace" font-size="16" font-weight="bold" fill="#00D9FF">[</text>
  <text x="23" y="22" font-family="monospace" font-size="16" font-weight="bold" fill="#00D9FF">]</text>
  <!-- IR text -->
  <text x="9" y="22" font-family="monospace" font-size="14" font-weight="bold" fill="url(#bg)">IR</text>
  <!-- Scan lines -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="28" x2="24" y2="28" stroke="#4F46E5" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
